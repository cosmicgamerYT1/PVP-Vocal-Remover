<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PvP Vocal Remover - AI Source Separation</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-1: #6a11cb;
            --accent-2: #2575fc;
            --accent-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --success: #00d4ff;
            --danger: #ff416c;
            --warn: #ffb84d;
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            animation: float 15s infinite ease-in-out;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: var(--accent-1); }
        .blob-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; background: var(--accent-2); animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 40px) scale(0.9); }
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 12, 41, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(106, 17, 203, 0.4);
        }

        .status-badge {
            padding: 8px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            flex: 1;
            height: calc(100vh - 81px);
        }

        .sidebar {
            background: rgba(15, 12, 41, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 20px;
        }

        .panel-title {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .queue-item {
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .queue-item.processing { border-left-color: var(--warn); }
        .queue-item.done { border-left-color: var(--success); }
        .queue-item.error { border-left-color: var(--danger); }

        .log-container {
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.75rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .log-entry { margin-bottom: 4px; }
        .log-entry.info { color: #4fc3f7; }
        .log-entry.success { color: #00e676; }
        .log-entry.warn { color: #ffb74d; }
        .log-entry.error { color: #ff5252; }

        .main-content {
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .upload-zone {
            background: var(--glass-bg);
            border: 2px dashed var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent-2);
            background: rgba(37, 117, 252, 0.1);
            transform: scale(1.01);
            box-shadow: 0 10px 40px rgba(37, 117, 252, 0.2);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            display: inline-block;
            animation: bounce 3s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .upload-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
        .upload-subtitle { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 24px; }

        .btn {
            padding: 12px 28px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            text-decoration: none;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(106, 17, 203, 0.5); }
        .btn:active { transform: translateY(0); }
        .btn.secondary { background: var(--glass-bg); border: 1px solid var(--glass-border); box-shadow: none; }
        .btn.secondary:hover { background: rgba(255,255,255,0.1); }
        .btn.danger { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); box-shadow: 0 4px 15px rgba(255, 65, 108, 0.3); }
        .btn.small { padding: 8px 16px; font-size: 0.85rem; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .workspace {
            display: none;
            flex-direction: column;
            gap: 24px;
        }

        .workspace.active { display: flex; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .file-name { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        
        .file-meta {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .meta-item {
            background: rgba(0,0,0,0.2);
            padding: 6px 12px;
            border-radius: 6px;
        }

        .waveform-container {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
        }

        canvas.waveform { width: 100%; height: 100px; display: block; }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-gradient);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(37, 117, 252, 0.5); }

        .time-display { font-size: 0.85rem; color: var(--text-secondary); font-family: monospace; }
        .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; position: relative; overflow: hidden;}
        .progress-fill { height: 100%; background: var(--accent-gradient); width: 0%; transition: width 0.1s linear; }

        .processing-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
        }

        .processing-view.active { display: flex; }

        .spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-2);
            border-right-color: var(--accent-1);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .processing-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
        .processing-subtext { color: var(--text-secondary); margin-bottom: 24px; }

        .progress-container { width: 100%; max-width: 500px; }
        .progress-main-bar { height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; margin-bottom: 12px; }
        .progress-main-fill { height: 100%; background: var(--accent-gradient); width: 0%; transition: width 0.3s ease; box-shadow: 0 0 15px rgba(37, 117, 252, 0.7); }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary); }

        .stems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .stem-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stem-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            opacity: 0.8;
        }

        .stem-card.voices::before { background: linear-gradient(90deg, #00c6ff, #0072ff); }
        .stem-card.music::before { background: linear-gradient(90deg, #8e2de2, #4a00e0); }
        .stem-card.sfx::before { background: linear-gradient(90deg, #f7971e, #ffd200); }

        .stem-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .stem-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .stem-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .stem-card.voices .stem-icon { background: rgba(0, 198, 255, 0.2); color: #00c6ff; }
        .stem-card.music .stem-icon { background: rgba(142, 45, 226, 0.2); color: #8e2de2; }
        .stem-card.sfx .stem-icon { background: rgba(247, 151, 30, 0.2); color: #f7971e; }

        .stem-name { font-weight: 600; font-size: 1.1rem; }
        .stem-desc { font-size: 0.8rem; color: var(--text-secondary); }

        .stem-waveform { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px; margin-bottom: 16px; height: 60px; }
        
        .stem-controls { display: flex; gap: 8px; }
        .stem-controls .btn { flex: 1; justify-content: center; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; height: auto; }
            .sidebar { display: none; }
            .main-content { padding: 20px; }
        }
        
        .hidden { display: none !important; }
        
        input[type="file"] { display: none; }
    </style>
</head>

    <script>
        // Firebase Configuration and Initialization
        const firebaseConfig = {

        let db = null;
        try {

            firebase.analytics();

        // Utility Classes
        class Logger {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
            }
            log(message, type = 'info') {
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                const time = new Date().toLocaleTimeString();
                entry.textContent = `[${time}] ${message}`;
                this.container.appendChild(entry);
                this.container.scrollTop = this.container.scrollHeight;
            }
        }

        class FirebaseService {
            constructor(database) {
                this.db = database;
                this.sessionId = null;
            }

            startSession(fileName, fileSize) {
                if (!this.db) return null;
                this.sessionId = this.db.ref('processing_sessions').push().key;
                const sessionData = {
                    fileName: fileName,
                    fileSize: fileSize,
                    startTime: firebase.database.ServerValue.TIMESTAMP,
                    status: 'INITIALIZED'
                };
                this.db.ref('processing_sessions/' + this.sessionId).set(sessionData);
                return this.sessionId;
            }

            updateStatus(status, progress = null) {
                if (!this.db || !this.sessionId) return;
                const updates = { status: status };
                if (progress !== null) updates.progress = progress;
                this.db.ref('processing_sessions/' + this.sessionId).update(updates);
            }

            logError(error) {
                if (!this.db || !this.sessionId) return;
                this.db.ref('processing_sessions/' + this.sessionId).update({
                    status: 'ERROR',
                    error: error.message || String(error),
                    endTime: firebase.database.ServerValue.TIMESTAMP
                });
            }

            endSession(stemsCreated) {
                if (!this.db || !this.sessionId) return;
                this.db.ref('processing_sessions/' + this.sessionId).update({
                    status: 'COMPLETED',
                    endTime: firebase.database.ServerValue.TIMESTAMP,
                    stemsCreated: stemsCreated
                });
            }
        }

        class WAVEncoder {
            static encode(audioBuffer) {
                const numChannels = audioBuffer.numberOfChannels;
                const sampleRate = audioBuffer.sampleRate;
                const format = 1; // PCM
                const bitDepth = 16;
                
                let samples;
                if (numChannels === 2) {
                    samples = this.interleave(audioBuffer.getChannelData(0), audioBuffer.getChannelData(1));
                } else {
                    samples = audioBuffer.getChannelData(0);
                }

                const dataLength = samples.length * (bitDepth / 8);
                const buffer = new ArrayBuffer(44 + dataLength);
                const view = new DataView(buffer);

                this.writeString(view, 0, 'RIFF');
                view.setUint32(4, 36 + dataLength, true);
                this.writeString(view, 8, 'WAVE');
                this.writeString(view, 12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, format, true);
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
                view.setUint16(32, numChannels * (bitDepth /8), true);
                view.setUint16(34, bitDepth, true);
                this.writeString(view, 36, 'data');
                view.setUint32(40, dataLength, true);

                this.floatTo16BitPCM(view, 44, samples);
                return new Blob([view], { type: 'audio/wav' });
            }

            static writeString(view, offset, string) {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            }

            static floatTo16BitPCM(view, offset, input) {
                for (let i = 0; i < input.length; i++, offset += 2) {
                    const s = Math.max(-1, Math.min(1, input[i]));
                    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                }
            }

            static interleave(left, right) {
                const length = left.length + right.length;
                const result = new Float32Array(length);
                let index = 0, inputIndex = 0;
                while (index < length) {
                    result[index++] = left[inputIndex];
                    result[index++] = right[inputIndex];
                    inputIndex++;
                }
                return result;
            }
        }

        class AudioExporter {
            static async encodeToMp4(audioBuffer) {
                return new Promise((resolve, reject) => {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    const dest = audioContext.createMediaStreamDestination();
                    source.connect(dest);
                    
                    let mimeType = 'audio/mp4';
                    if (!MediaRecorder.isTypeSupported(mimeType)) {
                        mimeType = 'audio/webm;codecs=opus';
                        if (!MediaRecorder.isTypeSupported(mimeType)) {
                            mimeType = 'audio/webm';
                        }
                    }
                    
                    // Set high bitrate to preserve quality identical to original
                    const options = {
                        mimeType: mimeType,
                        audioBitsPerSecond: 384000 // High quality 384kbps
                    };
                    
                    const recorder = new MediaRecorder(dest.stream, options);
                    const chunks = [];
                    recorder.ondataavailable = e => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/mp4' });
                        resolve(blob);
                        audioContext.close();
                    };
                    
                    source.onended = () => {
                        recorder.stop();
                    };
                    
                    source.start(0);
                    recorder.start();
                });
            }
        }

        // ==================== Neural Vocal Separation (MDX-Net via onnxruntime-web) ====================
        // This replaces the guesswork of fixed frequency bands with an actual pretrained
        // source-separation model, so vocals can be removed without needing a "safe gap"
        // of skipped frequencies that used to let vocal harmonics/sibilance leak through
        // in the bass/treble bands. If the model can't be downloaded or run (offline, a
        // shape mismatch, etc.) everything automatically falls back to the original
        // Mid/Side DSP method below - nothing about that method has been changed.

        const ML_MODEL_URL = 'https://github.com/TRvlvr/model_repo/releases/download/all_public_uvr_models/Kim_Vocal_1.onnx';
        const ML_N_FFT = 6144;
        const ML_HOP = 1024;
        const ML_DIM_F = 2048;
        const ML_DIM_T = 256;

        function mlIsPowerOf2(n) { return (n & (n - 1)) === 0 && n > 0; }
        function mlNextPow2(n) { let p = 1; while (p < n) p <<= 1; return p; }

        // Iterative radix-2 Cooley-Tukey FFT (in place). Verified against numpy to ~1e-13 precision.
        function mlFftRadix2(re, im, invert) {
            const n = re.length;
            if (n === 1) return;
            for (let i = 1, j = 0; i < n; i++) {
                let bit = n >> 1;
                for (; j & bit; bit >>= 1) j ^= bit;
                j ^= bit;
                if (i < j) {
                    let t = re[i]; re[i] = re[j]; re[j] = t;
                    t = im[i]; im[i] = im[j]; im[j] = t;
                }
            }
            for (let len = 2; len <= n; len <<= 1) {
                const ang = (invert ? 1 : -1) * 2 * Math.PI / len;
                const wr = Math.cos(ang), wi = Math.sin(ang);
                for (let i = 0; i < n; i += len) {
                    let curWr = 1, curWi = 0;
                    for (let j = 0; j < len / 2; j++) {
                        const ur = re[i + j], ui = im[i + j];
                        const vr = re[i + j + len / 2] * curWr - im[i + j + len / 2] * curWi;
                        const vi = re[i + j + len / 2] * curWi + im[i + j + len / 2] * curWr;
                        re[i + j] = ur + vr; im[i + j] = ui + vi;
                        re[i + j + len / 2] = ur - vr; im[i + j + len / 2] = ui - vi;
                        const nWr = curWr * wr - curWi * wi;
                        const nWi = curWr * wi + curWi * wr;
                        curWr = nWr; curWi = nWi;
                    }
                }
            }
            if (invert) { for (let i = 0; i < n; i++) { re[i] /= n; im[i] /= n; } }
        }

        // Bluestein's algorithm: arbitrary-length DFT (needed because n_fft=6144 isn't a power of 2).
        // Verified against numpy to ~1e-11 precision.
        function mlFftBluestein(re, im, invert) {
            const n = re.length;
            const m = mlNextPow2(n * 2 - 1);
            const cosT = new Float64Array(n), sinT = new Float64Array(n);
            for (let i = 0; i < n; i++) {
                const j = (i * i) % (n * 2);
                const ang = (invert ? 1 : -1) * Math.PI * j / n;
                cosT[i] = Math.cos(ang); sinT[i] = Math.sin(ang);
            }
            const are = new Float64Array(m), aim = new Float64Array(m);
            for (let i = 0; i < n; i++) {
                are[i] = re[i] * cosT[i] - im[i] * sinT[i];
                aim[i] = re[i] * sinT[i] + im[i] * cosT[i];
            }
            const bre = new Float64Array(m), bim = new Float64Array(m);
            bre[0] = cosT[0]; bim[0] = -sinT[0];
            for (let i = 1; i < n; i++) {
                bre[i] = bre[m - i] = cosT[i];
                bim[i] = bim[m - i] = -sinT[i];
            }
            mlFftRadix2(are, aim, false);
            mlFftRadix2(bre, bim, false);
            for (let i = 0; i < m; i++) {
                const r = are[i] * bre[i] - aim[i] * bim[i];
                const im2 = are[i] * bim[i] + aim[i] * bre[i];
                are[i] = r; aim[i] = im2;
            }
            mlFftRadix2(are, aim, true);
            for (let i = 0; i < n; i++) {
                re[i] = are[i] * cosT[i] - aim[i] * sinT[i];
                im[i] = are[i] * sinT[i] + aim[i] * cosT[i];
            }
            if (invert) { for (let i = 0; i < n; i++) { re[i] /= n; im[i] /= n; } }
        }

        function mlFft(re, im) { if (mlIsPowerOf2(re.length)) mlFftRadix2(re, im, false); else mlFftBluestein(re, im, false); }
        function mlIfft(re, im) { if (mlIsPowerOf2(re.length)) mlFftRadix2(re, im, true); else mlFftBluestein(re, im, true); }

        function mlHannWindow(n) {
            const w = new Float64Array(n);
            for (let i = 0; i < n; i++) w[i] = 0.5 - 0.5 * Math.cos(2 * Math.PI * i / n);
            return w;
        }

        class MDXVocalSeparator {
            constructor(logger) {
                this.logger = logger;
                this.session = null;
                this.window = mlHannWindow(ML_N_FFT);
                this.chunkWindow = mlHannWindow(ML_DIM_T); // for blending overlapping inference chunks
            }

            async load() {
                this.logger.log('Fetching neural vocal-separation model (Kim_Vocal_1, one-time download)...', 'info');
                const res = await fetch(ML_MODEL_URL);
                if (!res.ok) throw new Error(`Model download failed: HTTP ${res.status}`);
                const total = Number(res.headers.get('content-length')) || 0;
                const reader = res.body.getReader();
                const chunks = [];
                let received = 0;
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    received += value.length;
                    if (total) {
                        const pct = ((received / total) * 100).toFixed(0);
                        this.logger.log(`Downloading model... ${pct}% (${(received / 1048576).toFixed(1)}MB / ${(total / 1048576).toFixed(1)}MB)`, 'info');
                    }
                }
                const modelBytes = new Uint8Array(received);
                let offset = 0;
                for (const c of chunks) { modelBytes.set(c, offset); offset += c.length; }

                ort.env.wasm.numThreads = 1; // avoids requiring COOP/COEP headers for a plain static file
                ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/';
                this.session = await ort.InferenceSession.create(modelBytes.buffer, { executionProviders: ['wasm'] });
                this.inputName = this.session.inputNames[0];
                this.outputName = this.session.outputNames[0];
                this.logger.log('Neural vocal-separation model loaded and ready.', 'success');
            }

            // Runs full separation on a stereo AudioBuffer at its own sample rate.
            // Returns { vocalsL, vocalsR } Float64Arrays the same length as the input.
            async separate(buffer, onStatus, checkCancel) {
                const L = buffer.getChannelData(0);
                const R = buffer.numberOfChannels > 1 ? buffer.getChannelData(1) : buffer.getChannelData(0);
                const n = L.length;

                const numFrames = Math.floor((n - ML_N_FFT) / ML_HOP) + 1;
                if (numFrames < 1) throw new Error('Audio too short for the model frame size');

                const specL = new Array(numFrames), specR = new Array(numFrames);
                for (let f = 0; f < numFrames; f++) {
                    const start = f * ML_HOP;
                    const reL = new Float64Array(ML_N_FFT), imL = new Float64Array(ML_N_FFT);
                    const reR = new Float64Array(ML_N_FFT), imR = new Float64Array(ML_N_FFT);
                    for (let i = 0; i < ML_N_FFT; i++) {
                        reL[i] = L[start + i] * this.window[i];
                        reR[i] = R[start + i] * this.window[i];
                    }
                    mlFft(reL, imL); mlFft(reR, imR);
                    specL[f] = { re: reL.slice(0, ML_DIM_F), im: imL.slice(0, ML_DIM_F) };
                    specR[f] = { re: reR.slice(0, ML_DIM_F), im: imR.slice(0, ML_DIM_F) };
                }

                const accRe = [new Float64Array(numFrames * ML_DIM_F), new Float64Array(numFrames * ML_DIM_F)];
                const accIm = [new Float64Array(numFrames * ML_DIM_F), new Float64Array(numFrames * ML_DIM_F)];
                const accW = new Float64Array(numFrames);

                const stride = Math.max(1, Math.floor(ML_DIM_T / 2)); // 50% overlap between inference chunks
                const totalChunks = Math.ceil(numFrames / stride);
                const cStride = ML_DIM_F * ML_DIM_T;
                let chunkIdx = 0;

                for (let chunkStart = 0; chunkStart < numFrames; chunkStart += stride) {
                    if (checkCancel && checkCancel()) throw new Error('CANCELLED');
                    chunkIdx++;
                    if (onStatus) onStatus(`Running neural separation (chunk ${chunkIdx}/${totalChunks})...`, 20 + Math.min(60, Math.round((chunkIdx / totalChunks) * 60)));

                    const tensorData = new Float32Array(4 * cStride);
                    const chunkLen = Math.min(ML_DIM_T, numFrames - chunkStart);
                    for (let t = 0; t < chunkLen; t++) {
                        const fr = chunkStart + t;
                        for (let fbin = 0; fbin < ML_DIM_F; fbin++) {
                            const base = fbin * ML_DIM_T + t;
                            tensorData[0 * cStride + base] = specL[fr].re[fbin];
                            tensorData[1 * cStride + base] = specR[fr].re[fbin];
                            tensorData[2 * cStride + base] = specL[fr].im[fbin];
                            tensorData[3 * cStride + base] = specR[fr].im[fbin];
                        }
                    }

                    const inputTensor = new ort.Tensor('float32', tensorData, [1, 4, ML_DIM_F, ML_DIM_T]);
                    const feeds = {}; feeds[this.inputName] = inputTensor;
                    const results = await this.session.run(feeds);
                    const outTensor = results[this.outputName];
                    const outData = outTensor.data;

                    if (!outData || outData.length !== 4 * cStride) {
                        throw new Error(`Unexpected model output size (got ${outData ? outData.length : 'none'}, expected ${4 * cStride}) - model I/O doesn't match assumptions`);
                    }

                    for (let t = 0; t < chunkLen; t++) {
                        const fr = chunkStart + t;
                        const w = this.chunkWindow[t] + 1e-6;
                        accW[fr] += w;
                        for (let fbin = 0; fbin < ML_DIM_F; fbin++) {
                            const base = fbin * ML_DIM_T + t;
                            const idx = fr * ML_DIM_F + fbin;
                            accRe[0][idx] += outData[0 * cStride + base] * w;
                            accRe[1][idx] += outData[1 * cStride + base] * w;
                            accIm[0][idx] += outData[2 * cStride + base] * w;
                            accIm[1][idx] += outData[3 * cStride + base] * w;
                        }
                    }
                }

                if (onStatus) onStatus('Reconstructing separated audio...', 82);

                const vocalsL = new Float64Array(n), vocalsR = new Float64Array(n);
                const normL = new Float64Array(n), normR = new Float64Array(n);

                for (let f = 0; f < numFrames; f++) {
                    const w = accW[f] > 1e-9 ? accW[f] : 1;
                    const start = f * ML_HOP;
                    for (let ch = 0; ch < 2; ch++) {
                        const re = new Float64Array(ML_N_FFT), im = new Float64Array(ML_N_FFT);
                        for (let fbin = 0; fbin < ML_DIM_F; fbin++) {
                            const idx = f * ML_DIM_F + fbin;
                            re[fbin] = accRe[ch][idx] / w;
                            im[fbin] = accIm[ch][idx] / w;
                        }
                        // Bins above ML_DIM_F are assumed vocal-free (matches the model's own training cutoff)
                        // and are mirrored via Hermitian symmetry so the inverse FFT stays real-valued.
                        for (let k = ML_N_FFT / 2 + 1; k < ML_N_FFT; k++) {
                            re[k] = re[ML_N_FFT - k];
                            im[k] = -im[ML_N_FFT - k];
                        }
                        mlIfft(re, im);
                        const outArr = ch === 0 ? vocalsL : vocalsR;
                        const normArr = ch === 0 ? normL : normR;
                        for (let i = 0; i < ML_N_FFT; i++) {
                            if (start + i >= n) break;
                            outArr[start + i] += re[i] * this.window[i];
                            normArr[start + i] += this.window[i] * this.window[i];
                        }
                    }
                }
                for (let i = 0; i < n; i++) {
                    if (normL[i] > 1e-8) vocalsL[i] /= normL[i];
                    if (normR[i] > 1e-8) vocalsR[i] /= normR[i];
                }

                return { vocalsL, vocalsR };
            }
        }

        class AudioPipeline {
            constructor(logger) {
                this.logger = logger;
                this.audioContext = null;
                this.currentBuffer = null;
                this.stems = {};
                this.isProcessing = false;
                this.shouldCancel = false;
                this.mlSeparator = new MDXVocalSeparator(logger);
                this.mlAvailable = false;
            }

            // Renders `buffer` at a different sample rate using the browser's own resampler.
            async resampleBuffer(buffer, targetRate) {
                if (buffer.sampleRate === targetRate) return buffer;
                const ctx = new OfflineAudioContext(buffer.numberOfChannels, Math.ceil(buffer.duration * targetRate), targetRate);
                const src = ctx.createBufferSource();
                src.buffer = buffer;
                src.connect(ctx.destination);
                src.start(0);
                return await ctx.startRendering();
            }

            initContext() {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            async decodeFile(file, onProgress) {
                this.initContext();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onprogress = (e) => {
                        if (e.lengthComputable && onProgress) {
                            onProgress((e.loaded / e.total) * 100);
                        }
                    };
                    reader.onload = async (e) => {
                        try {
                            this.logger.log(`Decoding ${file.name}...`, 'info');
                            const arrayBuffer = e.target.result;
                            const audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
                            this.currentBuffer = audioBuffer;
                            this.logger.log(`Decoded successfully: ${audioBuffer.duration.toFixed(2)}s, ${audioBuffer.sampleRate}Hz`, 'success');
                            resolve(audioBuffer);
                        } catch (err) {
                            this.logger.log(`Decode error: ${err.message}`, 'error');
                            reject(new Error('Unable to decode this file format in the browser.'));
                        }
                    };
                    reader.onerror = () => reject(new Error('File read error'));
                    reader.readAsArrayBuffer(file);
                });
            }

            async loadModel() {
                this.logger.log('Checking for AI separation models...', 'info');
                try {
                    await this.mlSeparator.load();
                    this.mlAvailable = true;
                } catch (err) {
                    this.logger.log(`Neural model unavailable (${err.message}) - Voices & Music will use the DSP fallback method.`, 'warn');
                    this.mlAvailable = false;
                }
                this.logger.log('DSP Matrix Engine initialized (Mid/Side Processing).', 'success');
                return true;
            }

            async processStems(onProgress, onStatus) {
                if (!this.currentBuffer) throw new Error("No audio buffer loaded");
                this.isProcessing = true;
                this.shouldCancel = false;

                const length = this.currentBuffer.length;
                const sampleRate = this.currentBuffer.sampleRate;
                const numChannels = 2; // Force stereo for Mid/Side

                // Attempt real neural separation first. On any failure, mlVoices/mlMusic
                // stay null and the untouched DSP code below runs exactly as it always has.
                let mlVoices = null, mlMusic = null;
                if (this.mlAvailable) {
                    onStatus("Preparing audio for neural separation...", 12);
                    try {
                        const checkCancel = () => this.shouldCancel;
                        const mlInputBuffer = await this.resampleBuffer(this.currentBuffer, 44100);
                        const { vocalsL, vocalsR } = await this.mlSeparator.separate(mlInputBuffer, onStatus, checkCancel);

                        const vocalsBuf44k = new AudioBuffer({ length: vocalsL.length, numberOfChannels: 2, sampleRate: 44100 });
                        vocalsBuf44k.copyToChannel(Float32Array.from(vocalsL), 0);
                        vocalsBuf44k.copyToChannel(Float32Array.from(vocalsR), 1);

                        const mixL44 = mlInputBuffer.getChannelData(0);
                        const mixR44 = mlInputBuffer.numberOfChannels > 1 ? mlInputBuffer.getChannelData(1) : mixL44;
                        const instL = new Float32Array(vocalsL.length);
                        const instR = new Float32Array(vocalsL.length);
                        for (let i = 0; i < vocalsL.length; i++) {
                            instL[i] = mixL44[i] - vocalsL[i];
                            instR[i] = mixR44[i] - vocalsR[i];
                        }
                        const musicBuf44k = new AudioBuffer({ length: instL.length, numberOfChannels: 2, sampleRate: 44100 });
                        musicBuf44k.copyToChannel(instL, 0);
                        musicBuf44k.copyToChannel(instR, 1);

                        mlVoices = await this.resampleBuffer(vocalsBuf44k, sampleRate);
                        mlMusic = await this.resampleBuffer(musicBuf44k, sampleRate);
                        this.logger.log('Neural separation complete for Voices & Music.', 'success');
                    } catch (err) {
                        if (err.message === 'CANCELLED') { this.isProcessing = false; return; }
                        this.logger.log(`Neural separation failed (${err.message}) - falling back to DSP method for this run.`, 'warn');
                        mlVoices = null; mlMusic = null;
                    }
                }

                // 1. Render Voices Stem (Mid Signal -> Vocal Bandpass)
                onStatus("Extracting Voices (Center & Vocal Band)", 20);
                if (this.shouldCancel) return;
                if (mlVoices) {
                    this.stems.voices = mlVoices;
                } else {
                    const ctx = new OfflineAudioContext(numChannels, length, sampleRate);
                    const src = ctx.createBufferSource();
                    src.buffer = this.currentBuffer;

                    const splitter = ctx.createChannelSplitter(2);
                    src.connect(splitter);

                    // Create Mid Signal (L+R)
                    const midMerger = ctx.createGain();
                    splitter.connect(midMerger, 0);
                    splitter.connect(midMerger, 1);

                    const hp = ctx.createBiquadFilter();
                    hp.type = "highpass";
                    hp.frequency.value = 300;
                    hp.Q.value = 1;

                    const lp = ctx.createBiquadFilter();
                    lp.type = "lowpass";
                    lp.frequency.value = 3400;
                    lp.Q.value = 1;

                    midMerger.connect(hp);
                    hp.connect(lp);

                    const outMerger = ctx.createChannelMerger(2);
                    lp.connect(outMerger, 0, 0);
                    lp.connect(outMerger, 0, 1);
                    outMerger.connect(ctx.destination);
                    
                    src.start(0);
                    this.stems.voices = await ctx.startRendering();
                }

                // 2. Render Music Stem (Instrumental)
                onStatus("Extracting Music (Instrumental & Bass)", 40);
                if (this.shouldCancel) return;
                if (mlMusic) {
                    this.stems.music = mlMusic;
                } else {
                    const ctx = new OfflineAudioContext(numChannels, length, sampleRate);
                    const src = ctx.createBufferSource();
                    src.buffer = this.currentBuffer;

                    const splitter = ctx.createChannelSplitter(2);
                    src.connect(splitter);

                    // --- SIDE SIGNAL (L-R) ---
                    // Keeps all stereo instruments and stereo reverb. Boosted to compensate for missing Mid.
                    const invR = ctx.createGain();
                    invR.gain.value = -1;
                    splitter.connect(invR, 1);
                    
                    const sideMerger = ctx.createGain();
                    sideMerger.gain.value = 1.5; // Boost Side signal
                    splitter.connect(sideMerger, 0);
                    invR.connect(sideMerger);
                    
                    // --- MID SIGNAL (L+R) ---
                    // Keeps center bass and center highs, completely removes center vocals (200Hz - 4000Hz)
                    const midMerger = ctx.createGain();
                    splitter.connect(midMerger, 0);
                    splitter.connect(midMerger, 1);
                    
                    // Keep < 200Hz from Mid (Bass, Kick Drums)
                    const midBassLP = ctx.createBiquadFilter();
                    midBassLP.type = "lowpass";
                    midBassLP.frequency.value = 200;
                    midBassLP.Q.value = 0.7;
                    midMerger.connect(midBassLP);
                    
                    // Keep > 4000Hz from Mid (High-hats, Cymbals, Snares)
                    const midHighsHP = ctx.createBiquadFilter();
                    midHighsHP.type = "highpass";
                    midHighsHP.frequency.value = 4000;
                    midHighsHP.Q.value = 0.7;
                    midMerger.connect(midHighsHP);
                    
                    // Combine Side + Mid Bass + Mid Highs
                    const sum = ctx.createGain();
                    sideMerger.connect(sum);
                    midBassLP.connect(sum);
                    midHighsHP.connect(sum);
                    
                    const outMerger = ctx.createChannelMerger(2);
                    sum.connect(outMerger, 0, 0);
                    sum.connect(outMerger, 0, 1);
                    outMerger.connect(ctx.destination);
                    
                    src.start(0);
                    this.stems.music = await ctx.startRendering();
                }

                // 3. Render SFX Stem (Side Signal -> Highpass)
                onStatus("Extracting Minecraft SFX (High-Freq Transients)", 60);
                if (this.shouldCancel) return;
                {
                    const ctx = new OfflineAudioContext(numChannels, length, sampleRate);
                    const src = ctx.createBufferSource();
                    src.buffer = this.currentBuffer;

                    const splitter = ctx.createChannelSplitter(2);
                    src.connect(splitter);

                    // Create Side Signal (L-R)
                    const invR = ctx.createGain();
                    invR.gain.value = -1;
                    splitter.connect(invR, 1);
                    
                    const sideMerger = ctx.createGain();
                    splitter.connect(sideMerger, 0);
                    invR.connect(sideMerger);
                    
                    const hp = ctx.createBiquadFilter();
                    hp.type = "highpass";
                    hp.frequency.value = 4000;
                    hp.Q.value = 0.7;
                    
                    sideMerger.connect(hp);
                    
                    const outMerger = ctx.createChannelMerger(2);
                    hp.connect(outMerger, 0, 0);
                    hp.connect(outMerger, 0, 1);
                    outMerger.connect(ctx.destination);
                    
                    src.start(0);
                    this.stems.sfx = await ctx.startRendering();
                }

                onStatus("Finalizing Stems...", 100);
                this.isProcessing = false;
                return this.stems;
            }

            cancel() {
                this.shouldCancel = true;
                this.isProcessing = false;
            }
        }

        class UIController {
            constructor() {
                this.logger = new Logger('log-container');
                this.firebase = new FirebaseService(db);
                this.pipeline = new AudioPipeline(this.logger);
                this.currentFile = null;
                this.audioElements = {};
                this.isPlaying = false;
                
                this.initElements();
                this.bindEvents();
                this.initKeyboardShortcuts();
                this.logger.log('Application initialized. Ready for files.', 'success');
                this.logger.log('Connected to Firebase Realtime Database.', 'success');
            }

            initElements() {
                this.uploadZone = document.getElementById('upload-view');
                this.workspace = document.getElementById('workspace');
                this.fileInput = document.getElementById('file-input');
                this.browseBtn = document.getElementById('browse-btn');
                
                this.fileName = document.getElementById('current-file-name');
                this.fileMeta = document.getElementById('file-meta-container');
                
                this.waveformCanvas = document.getElementById('original-waveform');
                this.playBtn = document.getElementById('play-original');
                this.playIcon = document.getElementById('play-icon');
                this.pauseIcon = document.getElementById('pause-icon');
                this.progressTrack = document.getElementById('progress-track');
                this.progressFill = document.getElementById('progress-fill');
                this.currentTimeEl = document.getElementById('current-time');
                this.totalDurationEl = document.getElementById('total-duration');
                
                this.processBtn = document.getElementById('process-btn');
                this.resetBtn = document.getElementById('reset-btn');
                
                this.processingView = document.getElementById('processing-view');
                this.processingStatus = document.getElementById('processing-status');
                this.processingSubstatus = document.getElementById('processing-substatus');
                this.mainProgress = document.getElementById('main-progress');
                this.progressPercent = document.getElementById('progress-percent');
                this.etaEl = document.getElementById('eta');
                this.cancelBtn = document.getElementById('cancel-btn');
                
                this.resultsView = document.getElementById('results-view');
                this.batchQueue = document.getElementById('batch-queue');
            }

            bindEvents() {
                this.browseBtn.addEventListener('click', () => this.fileInput.click());
                this.uploadZone.addEventListener('click', () => this.fileInput.click());
                
                this.fileInput.addEventListener('change', (e) => this.handleFiles(e.target.files));
                
                this.uploadZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    this.uploadZone.classList.add('dragover');
                });
                this.uploadZone.addEventListener('dragleave', () => this.uploadZone.classList.remove('dragover'));
                this.uploadZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    this.uploadZone.classList.remove('dragover');
                    this.handleFiles(e.dataTransfer.files);
                });

                this.playBtn.addEventListener('click', () => this.togglePlay('original'));
                this.processBtn.addEventListener('click', () => this.startProcessing());
                this.resetBtn.addEventListener('click', () => this.resetWorkspace());
                this.cancelBtn.addEventListener('click', () => this.cancelProcessing());
                
                this.progressTrack.addEventListener('click', (e) => this.seek(e));
            }

            initKeyboardShortcuts() {
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' && this.workspace.classList.contains('active')) {
                        e.preventDefault();
                        this.togglePlay('original');
                    }
                    if (e.code === 'Escape') {
                        this.resetWorkspace();
                    }
                });
            }

            async handleFiles(fileList) {
                const files = Array.from(fileList);
                if (files.length === 0) return;

                this.updateBatchQueue(files);

                this.currentFile = files[0];
                this.logger.log(`File selected: ${this.currentFile.name}`, 'info');
                
                this.uploadZone.style.display = 'none';
                this.workspace.classList.add('active');
                
                this.fileName.textContent = this.currentFile.name;
                this.fileMeta.innerHTML = `
                    <div class="meta-item">${(this.currentFile.size / 1024 / 1024).toFixed(2)} MB</div>
                `;

                try {
                    this.firebase.startSession(this.currentFile.name, this.currentFile.size);
                    this.logger.log('Session logged to Firebase.', 'info');

                    const audioBuffer = await this.pipeline.decodeFile(this.currentFile);
                    this.totalDurationEl.textContent = this.formatTime(audioBuffer.duration);
                    this.fileMeta.innerHTML += `
                        <div class="meta-item">${audioBuffer.sampleRate} Hz</div>
                        <div class="meta-item">${audioBuffer.numberOfChannels} Ch</div>
                        <div class="meta-item">${(this.currentFile.size / 1024 / 1024 / audioBuffer.duration * 8).toFixed(0)} kbps</div>
                    `;
                    this.drawWaveform(audioBuffer, this.waveformCanvas);
                    this.prepareOriginalAudio(audioBuffer);
                } catch (err) {
                    this.showToast(err.message, 'error');
                    this.logger.log(err.message, 'error');
                    this.firebase.logError(err);
                }
            }

            updateBatchQueue(files) {
                this.batchQueue.innerHTML = '';
                files.forEach((file, idx) => {
                    const item = document.createElement('div');
                    item.className = `queue-item ${idx === 0 ? 'processing' : ''}`;
                    item.innerHTML = `<span>${file.name}</span><span>${idx === 0 ? 'Active' : 'Queued'}</span>`;
                    this.batchQueue.appendChild(item);
                });
            }

            prepareOriginalAudio(buffer) {
                const blob = WAVEncoder.encode(buffer);
                const url = URL.createObjectURL(blob);
                this.audioElements.original = new Audio(url);
                this.audioElements.original.addEventListener('timeupdate', () => this.updateProgress());
                this.audioElements.original.addEventListener('ended', () => this.resetPlayButton());
            }

            drawWaveform(audioBuffer, canvas) {
                const ctx = canvas.getContext('2d');
                const width = canvas.offsetWidth;
                const height = canvas.offsetHeight;
                canvas.width = width;
                canvas.height = height;
                
                const data = audioBuffer.getChannelData(0);
                const step = Math.ceil(data.length / width);
                const amp = height / 2;
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillRect(0, 0, width, height);
                
                ctx.strokeStyle = '#2575fc';
                ctx.lineWidth = 1;
                ctx.beginPath();
                
                for (let i = 0; i < width; i++) {
                    let min = 1.0, max = -1.0;
                    for (let j = 0; j < step; j++) {
                        const datum = data[(i * step) + j];
                        if (datum < min) min = datum;
                        if (datum > max) max = datum;
                    }
                    ctx.moveTo(i, (1 + min) * amp);
                    ctx.lineTo(i, (1 + max) * amp);
                }
                ctx.stroke();
                
                const gradient = ctx.createLinearGradient(0, 0, width, 0);
                gradient.addColorStop(0, 'rgba(106, 17, 203, 0.4)');
                gradient.addColorStop(1, 'rgba(37, 117, 252, 0.4)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
            }

            togglePlay(type) {
                const audio = this.audioElements[type];
                if (!audio) return;
                
                if (audio.paused) {
                    Object.values(this.audioElements).forEach(a => { if(a !== audio) a.pause(); });
                    audio.play();
                    if (type === 'original') {
                        this.playIcon.classList.add('hidden');
                        this.pauseIcon.classList.remove('hidden');
                    }
                } else {
                    audio.pause();
                    if (type === 'original') {
                        this.playIcon.classList.remove('hidden');
                        this.pauseIcon.classList.add('hidden');
                    }
                }
            }

            resetPlayButton() {
                this.playIcon.classList.remove('hidden');
                this.pauseIcon.classList.add('hidden');
            }

            updateProgress() {
                const audio = this.audioElements.original;
                if (!audio) return;
                const percent = (audio.currentTime / audio.duration) * 100;
                this.progressFill.style.width = `${percent}%`;
                this.currentTimeEl.textContent = this.formatTime(audio.currentTime);
            }

            seek(e) {
                const audio = this.audioElements.original;
                if (!audio) return;
                const rect = this.progressTrack.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
            }

            async startProcessing() {
                this.processingView.classList.add('active');
                this.processBtn.disabled = true;
                this.resultsView.style.display = 'none';
                this.resultsView.innerHTML = '';
                
                try {
                    this.firebase.updateStatus('PROCESSING', 0);
                    await this.pipeline.loadModel();
                    const startTime = Date.now();
                    
                    const stems = await this.pipeline.processStems(
                        (progress) => this.updateProgressUI(progress, startTime),
                        (status, progress) => this.updateStatusUI(status, progress, startTime)
                    );
                    
                    if (this.pipeline.shouldCancel) {
                        this.logger.log('Processing cancelled by user.', 'warn');
                        this.firebase.updateStatus('CANCELLED', 0);
                        this.resetProcessingUI();
                        return;
                    }

                    this.logger.log('Stem separation completed. Starting MP4 encoding...', 'success');
                    await this.displayStems(stems);
                    this.firebase.endSession(['voices', 'music', 'sfx']);
                    
                } catch (err) {
                    this.logger.log(`Processing error: ${err.message}`, 'error');
                    this.showToast(err.message, 'error');
                    this.firebase.logError(err);
                    this.resetProcessingUI();
                }
            }

            updateStatusUI(status, progress, startTime) {
                this.processingStatus.textContent = status;
                this.mainProgress.style.width = `${progress}%`;
                this.progressPercent.textContent = `${progress}%`;
                
                this.firebase.updateStatus(status, progress);

                if (progress > 0 && progress < 100) {
                    const elapsed = (Date.now() - startTime) / 1000;
                    const total = elapsed / (progress / 100);
                    const remaining = total - elapsed;
                    if (remaining > 0 && isFinite(remaining)) {
                        this.etaEl.textContent = `ETA: ${Math.ceil(remaining)}s remaining`;
                    }
                } else if (progress === 100) {
                    this.etaEl.textContent = `Completed`;
                }
            }

            updateProgressUI(progress, startTime) {
                this.mainProgress.style.width = `${progress}%`;
                this.progressPercent.textContent = `${Math.round(progress)}%`;
            }

            cancelProcessing() {
                this.pipeline.cancel();
                this.firebase.updateStatus('CANCELLED', 0);
                this.resetProcessingUI();
            }

            resetProcessingUI() {
                this.processingView.classList.remove('active');
                this.processBtn.disabled = false;
            }

            async displayStems(stems) {
                this.processingView.classList.remove('active');
                this.resultsView.style.display = 'grid';
                this.resultsView.innerHTML = '';

                const stemConfigs = [
                    { key: 'voices', name: 'Voices Only', desc: 'Discord, Teammates, Streamer', icon: '🎙️', class: 'voices', filename: 'Voices.mp4' },
                    { key: 'music', name: 'Music Only', desc: 'Background tracks, Instrumentals', icon: '🎵', class: 'music', filename: 'Music.mp4' },
                    { key: 'sfx', name: 'Minecraft SFX', desc: 'Swords, Pearls, Blocks, Mobs', icon: '⚔️', class: 'sfx', filename: 'Minecraft_SFX.mp4' }
                ];

                for (const cfg of stemConfigs) {
                    const buffer = stems[cfg.key];
                    
                    const card = document.createElement('div');
                    card.className = `stem-card ${cfg.class}`;
                    card.innerHTML = `
                        <div class="stem-header">
                            <div class="stem-icon">${cfg.icon}</div>
                            <div>
                                <div class="stem-name">${cfg.name}</div>
                                <div class="stem-desc">${cfg.desc}</div>
                            </div>
                        </div>
                        <canvas class="stem-waveform" id="wave-${cfg.key}"></canvas>
                        <div class="stem-controls">
                            <button class="btn small secondary" data-play="${cfg.key}" disabled>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                Play
                            </button>
                            <button class="btn small" id="dl-${cfg.key}" disabled>
                                <div class="spinner" style="width: 14px; height: 14px; border-width: 2px; margin: 0;"></div>
                                Encoding...
                            </button>
                        </div>
                    `;
                    this.resultsView.appendChild(card);

                    setTimeout(() => {
                        const canvas = document.getElementById(`wave-${cfg.key}`);
                        this.drawWaveform(buffer, canvas);
                    }, 100);

                    // Encode to MP4
                    const blob = await AudioExporter.encodeToMp4(buffer);
                    const url = URL.createObjectURL(blob);
                    
                    this.audioElements[cfg.key] = new Audio(url);
                    this.audioElements[cfg.key].addEventListener('ended', () => {
                        const btn = card.querySelector(`[data-play="${cfg.key}"]`);
                        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Play`;
                    });

                    const playBtn = card.querySelector(`[data-play="${cfg.key}"]`);
                    const dlBtn = document.getElementById(`dl-${cfg.key}`);
                    
                    playBtn.disabled = false;
                    playBtn.addEventListener('click', (e) => {
                        const key = e.currentTarget.dataset.play;
                        this.togglePlay(key);
                        const isPlaying = !this.audioElements[key].paused;
                        e.currentTarget.innerHTML = isPlaying ? 
                            `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg> Pause` :
                            `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Play`;
                    });

                    dlBtn.disabled = false;
                    dlBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Download`;
                    
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = cfg.filename;
                    dlBtn.addEventListener('click', () => a.click());
                }
                
                this.logger.log('All stems encoded to MP4 and ready for download.', 'success');
            }

            resetWorkspace() {
                Object.values(this.audioElements).forEach(a => { if(a) { a.pause(); a.src = ''; } });
                this.audioElements = {};
                
                this.pipeline.currentBuffer = null;
                this.pipeline.stems = {};
                
                this.workspace.classList.remove('active');
                this.uploadZone.style.display = 'block';
                this.processingView.classList.remove('active');
                this.resultsView.style.display = 'none';
                this.resultsView.innerHTML = '';
                this.processBtn.disabled = false;
                this.resetPlayButton();
                this.progressFill.style.width = '0%';
                
                this.fileInput.value = '';
                this.batchQueue.innerHTML = '<div style="color: var(--text-secondary); font-size: 0.85rem; text-align: center; padding: 10px;">No files queued</div>';
                this.logger.log('Workspace reset.', 'info');
            }

            formatTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }

            showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed; bottom: 30px; right: 30px; padding: 16px 24px;
                    background: ${type === 'error' ? 'linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%)' : 'var(--accent-gradient)'};
                    color: white; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                    z-index: 1000; animation: fadeIn 0.3s ease;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.app = new UIController();
        });
    </script>
